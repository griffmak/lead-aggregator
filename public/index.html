<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lead Aggregator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <style>
    /* ─── DESIGN TOKENS ─────────────────────────────────────────── */
    :root {
      --bg:        #0b0e14;
      --surface:   #111520;
      --surface2:  #181d2b;
      --surface3:  #1f2538;
      --border:    #252c40;
      --border2:   #2e3650;
      --text:      #e8eaf2;
      --text-dim:  #7a849e;
      --text-faint:#3d4560;
      --amber:     #f5a623;
      --amber-dim: #7a5011;
      --green:     #3de57a;
      --green-dim: #1a4030;
      --red:       #f55a5a;
      --blue:      #5a9cf5;
      --font-head: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
      --radius:    6px;
      --transition: 180ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ─── RESET & BASE ──────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { font-size: 14px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Subtle grid overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
    }

    /* ─── LAYOUT ────────────────────────────────────────────────── */
    #app { position: relative; z-index: 1; display: flex; flex-direction: column; min-height: 100vh; }

    /* ─── HEADER ────────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 28px;
      border-bottom: 1px solid var(--border);
      background: rgba(11,14,20,0.9);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-mark {
      width: 30px;
      height: 30px;
      border: 2px solid var(--amber);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-head);
      font-weight: 800;
      font-size: 13px;
      color: var(--amber);
      letter-spacing: -0.5px;
      flex-shrink: 0;
    }

    h1 {
      font-family: var(--font-head);
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text);
    }

    .header-sep { flex: 1; }

    .stats-bar {
      display: flex;
      gap: 20px;
    }

    .stat {
      text-align: right;
    }

    .stat-val {
      font-family: var(--font-head);
      font-size: 16px;
      font-weight: 700;
      color: var(--amber);
      display: block;
    }

    .stat-label {
      font-size: 10px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    header nav {
      display: flex;
      gap: 8px;
    }

    /* ─── BUTTONS ───────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: var(--radius);
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      border: 1px solid transparent;
      text-decoration: none;
      white-space: nowrap;
    }

    .btn-ghost {
      background: transparent;
      border-color: var(--border2);
      color: var(--text-dim);
    }
    .btn-ghost:hover { border-color: var(--border2); background: var(--surface2); color: var(--text); }

    .btn-primary {
      background: var(--amber);
      color: #000;
      font-weight: 600;
      border-color: var(--amber);
    }
    .btn-primary:hover { background: #ffb93a; }

    .btn-danger {
      background: transparent;
      border-color: var(--border2);
      color: var(--text-dim);
    }
    .btn-danger:hover { border-color: var(--red); color: var(--red); background: rgba(245,90,90,0.06); }

    .btn-sm { padding: 5px 10px; font-size: 11px; }

    .btn svg { width: 13px; height: 13px; flex-shrink: 0; }

    /* ─── TOOLBAR ───────────────────────────────────────────────── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 28px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .filter-group {
      display: flex;
      gap: 1px;
      background: var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .filter-btn {
      padding: 6px 14px;
      font-family: var(--font-mono);
      font-size: 11px;
      cursor: pointer;
      border: none;
      background: var(--surface);
      color: var(--text-dim);
      transition: var(--transition);
    }
    .filter-btn:hover { color: var(--text); background: var(--surface2); }
    .filter-btn.active {
      background: var(--surface3);
      color: var(--amber);
      font-weight: 500;
    }

    .search-wrap {
      position: relative;
      flex: 1;
      max-width: 300px;
    }
    .search-wrap svg {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 13px;
      height: 13px;
      color: var(--text-faint);
      pointer-events: none;
    }
    .search-input {
      width: 100%;
      padding: 7px 12px 7px 30px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 12px;
      outline: none;
      transition: var(--transition);
    }
    .search-input::placeholder { color: var(--text-faint); }
    .search-input:focus { border-color: var(--amber); }

    .toolbar-sep { flex: 1; }

    /* ─── MAIN CONTENT ──────────────────────────────────────────── */
    main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ─── TABLE AREA ────────────────────────────────────────────── */
    .table-area {
      flex: 1;
      overflow: auto;
      padding: 0;
    }

    /* Loading / empty states */
    .state-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 80px 20px;
      color: var(--text-dim);
      font-size: 13px;
    }

    .state-screen svg { width: 36px; height: 36px; opacity: 0.4; }
    .state-screen h3 { font-family: var(--font-head); font-size: 17px; color: var(--text-dim); font-weight: 600; }

    .spinner {
      width: 28px;
      height: 28px;
      border: 2px solid var(--border2);
      border-top-color: var(--amber);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── DATA TABLE ────────────────────────────────────────────── */
    .data-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
    }

    .data-table thead {
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .data-table th {
      padding: 10px 16px;
      text-align: left;
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }

    .data-table th:hover { color: var(--text); }

    .data-table th.sort-asc::after  { content: ' ↑'; color: var(--amber); }
    .data-table th.sort-desc::after { content: ' ↓'; color: var(--amber); }

    .data-table tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background var(--transition);
      cursor: pointer;
    }

    .data-table tbody tr:hover { background: var(--surface2); }
    .data-table tbody tr.selected { background: var(--surface3) !important; }

    .data-table td {
      padding: 11px 16px;
      font-size: 12px;
      vertical-align: middle;
      white-space: nowrap;
    }

    /* Brand name cell */
    .td-brand {
      font-weight: 500;
      color: var(--text);
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Property check cell */
    .td-prop {
      text-align: center;
    }

    .check-yes {
      display: inline-flex;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: rgba(61,229,122,0.12);
      border: 1.5px solid var(--green);
      align-items: center;
      justify-content: center;
    }
    .check-yes svg { width: 10px; height: 10px; color: var(--green); }

    /* Crossover badge */
    .crossover-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 8px;
      border-radius: 100px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .crossover-yes {
      background: rgba(245,166,35,0.12);
      border: 1px solid var(--amber-dim);
      color: var(--amber);
    }

    .crossover-no {
      background: transparent;
      color: var(--text-faint);
    }

    .crossover-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    /* View button */
    .view-btn {
      padding: 4px 10px;
      border-radius: var(--radius);
      font-family: var(--font-mono);
      font-size: 10px;
      cursor: pointer;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--text-dim);
      transition: var(--transition);
    }
    .view-btn:hover { border-color: var(--amber); color: var(--amber); }

    /* ─── DETAIL PANEL ──────────────────────────────────────────── */
    .detail-panel {
      width: 360px;
      flex-shrink: 0;
      border-left: 1px solid var(--border);
      background: var(--surface);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 300ms cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }

    .detail-panel.open { transform: translateX(0); }

    .panel-header {
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .panel-brand-name {
      flex: 1;
      font-family: var(--font-head);
      font-size: 16px;
      font-weight: 700;
      line-height: 1.3;
      word-break: break-word;
    }

    .close-panel {
      width: 28px;
      height: 28px;
      border-radius: var(--radius);
      background: transparent;
      border: 1px solid var(--border2);
      color: var(--text-dim);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: var(--transition);
    }
    .close-panel:hover { border-color: var(--text-dim); color: var(--text); }
    .close-panel svg { width: 12px; height: 12px; }

    .panel-body { padding: 16px 20px; flex: 1; display: flex; flex-direction: column; gap: 20px; }

    .panel-section-title {
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      margin-bottom: 8px;
    }

    .property-appearance {
      padding: 12px 14px;
      background: var(--surface2);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      margin-bottom: 8px;
    }

    .prop-name-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
    }

    .prop-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
    }

    .prop-name {
      font-family: var(--font-head);
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
    }

    .prop-date {
      font-size: 10px;
      color: var(--text-faint);
      margin-left: auto;
    }

    .prop-notes {
      font-size: 11px;
      color: var(--text-dim);
      line-height: 1.5;
      margin-top: 4px;
    }

    .prop-notes-empty { font-style: italic; color: var(--text-faint); }

    /* Property picker in upload modal */
    .property-picker {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .property-pick-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 8px 14px;
      border-radius: var(--radius);
      border: 1.5px solid var(--border2);
      background: var(--surface2);
      color: var(--text-dim);
      font-family: var(--font-mono);
      font-size: 12px;
      cursor: pointer;
      transition: var(--transition);
      user-select: none;
    }

    .property-pick-btn:hover {
      border-color: var(--amber);
      color: var(--text);
    }

    .property-pick-btn.selected {
      border-color: var(--amber);
      background: rgba(245,166,35,0.10);
      color: var(--amber);
      font-weight: 600;
    }

    .property-pick-btn .pick-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      border: 1.5px solid currentColor;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .property-pick-btn.selected .pick-dot::after {
      content: '';
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--amber);
    }

    .property-picker-empty {
      font-size: 12px;
      color: var(--text-faint);
      font-style: italic;
      padding: 4px 0;
    }

    /* ─── MODALS ────────────────────────────────────────────────── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--transition);
    }
    .modal-backdrop.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 8px;
      width: 100%;
      max-width: 480px;
      max-height: 80vh;
      overflow-y: auto;
      transform: translateY(20px);
      transition: transform var(--transition);
    }
    .modal-backdrop.open .modal { transform: translateY(0); }

    .modal-header {
      padding: 20px 22px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-title {
      font-family: var(--font-head);
      font-size: 15px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .modal-body { padding: 20px 22px; display: flex; flex-direction: column; gap: 14px; }
    .modal-footer { padding: 14px 22px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }

    /* Form elements */
    label {
      display: block;
      font-size: 11px;
      color: var(--text-dim);
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    input[type="text"], select {
      width: 100%;
      padding: 9px 12px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 12px;
      outline: none;
      transition: var(--transition);
      appearance: none;
    }
    input[type="text"]:focus, select:focus { border-color: var(--amber); }

    select option { background: var(--surface2); }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
    .checkbox-row input { width: auto; cursor: pointer; accent-color: var(--amber); }
    .checkbox-row span { font-size: 12px; color: var(--text-dim); }

    /* Drop zone */
    .drop-zone {
      border: 2px dashed var(--border2);
      border-radius: var(--radius);
      padding: 30px 20px;
      text-align: center;
      cursor: pointer;
      transition: var(--transition);
      background: var(--surface2);
    }
    .drop-zone:hover, .drop-zone.dragover { border-color: var(--amber); background: rgba(245,166,35,0.04); }
    .drop-zone.has-file { border-color: var(--green); border-style: solid; }

    .drop-zone-icon { font-size: 28px; margin-bottom: 8px; }
    .drop-zone-text { font-size: 12px; color: var(--text-dim); }
    .drop-zone-sub { font-size: 10px; color: var(--text-faint); margin-top: 4px; }
    .drop-zone-file { font-size: 12px; color: var(--green); font-weight: 500; margin-top: 4px; }

    /* Preview results */
    .preview-results {
      display: flex;
      gap: 8px;
    }

    .preview-stat {
      flex: 1;
      padding: 12px;
      background: var(--surface2);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      text-align: center;
    }

    .preview-stat-val {
      display: block;
      font-family: var(--font-head);
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
    }
    .preview-stat-val.green { color: var(--green); }
    .preview-stat-val.amber { color: var(--amber); }

    .preview-stat-label {
      font-size: 10px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-top: 2px;
      display: block;
    }

    /* Properties list in manage modal */
    .property-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .property-item {
      display: flex;
      align-items: center;
      padding: 10px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      gap: 10px;
    }

    .prop-item-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
    }

    .prop-item-name {
      flex: 1;
      font-size: 13px;
      font-weight: 500;
    }

    /* Error / info messages */
    .message {
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 12px;
      line-height: 1.4;
    }
    .message-error { background: rgba(245,90,90,0.08); border: 1px solid rgba(245,90,90,0.3); color: var(--red); }
    .message-info  { background: rgba(90,156,245,0.08); border: 1px solid rgba(90,156,245,0.3); color: var(--blue); }

    /* ─── MISC ──────────────────────────────────────────────────── */
    .hidden { display: none !important; }

    *:focus-visible { outline: 2px solid var(--amber); outline-offset: 2px; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-faint); }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .data-table tbody tr {
      animation: fadeIn 200ms ease both;
    }
  </style>
</head>
<body>
<div id="app">

  <!-- ─── HEADER ─────────────────────────────────────────────── -->
  <header>
    <div class="logo">
      <div class="logo-mark">LA</div>
      <h1>Lead Aggregator</h1>
    </div>
    <div class="header-sep"></div>
    <div class="stats-bar">
      <div class="stat">
        <span class="stat-val" id="stat-brands">–</span>
        <span class="stat-label">Brands</span>
      </div>
      <div class="stat">
        <span class="stat-val" id="stat-properties">–</span>
        <span class="stat-label">Properties</span>
      </div>
      <div class="stat">
        <span class="stat-val" id="stat-crossovers">–</span>
        <span class="stat-label">Crossovers</span>
      </div>
    </div>
    <nav>
      <button class="btn btn-ghost" onclick="openManageModal()">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="3"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41"/></svg>
        Manage Properties
      </button>
      <button class="btn btn-primary" onclick="openUploadModal()">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 10V3M5 6l3-3 3 3M3 13h10"/></svg>
        Upload List
      </button>
    </nav>
  </header>

  <!-- ─── TOOLBAR ────────────────────────────────────────────── -->
  <div class="toolbar">
    <div class="filter-group">
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" data-filter="crossovers" onclick="setFilter('crossovers', this)">Crossovers Only</button>
    </div>
    <div class="search-wrap">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6.5" cy="6.5" r="4.5"/><path d="M10 10l3 3"/></svg>
      <input class="search-input" type="text" id="search-input" placeholder="Search brands…" oninput="renderTable()" />
    </div>
    <div class="toolbar-sep"></div>
    <span id="table-count" style="font-size:11px;color:var(--text-dim)"></span>
  </div>

  <!-- ─── MAIN ───────────────────────────────────────────────── -->
  <main>
    <div class="table-area" id="table-area">
      <div class="state-screen" id="loading-state">
        <div class="spinner"></div>
        <p>Loading data…</p>
      </div>
      <div class="state-screen hidden" id="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 17H7A5 5 0 0 1 7 7h2M15 7h2a5 5 0 0 1 0 10h-2M8 12h8"/></svg>
        <h3>No brands yet</h3>
        <p>Upload a lead list to get started.</p>
        <button class="btn btn-primary" onclick="openUploadModal()">Upload List</button>
      </div>
      <div id="table-wrap" class="hidden">
        <table class="data-table" id="data-table">
          <thead id="table-head"></thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </div>

    <!-- ─── DETAIL PANEL ──────────────────────────────────────── -->
    <aside class="detail-panel" id="detail-panel">
      <div class="panel-header">
        <div class="panel-brand-name" id="panel-brand-name">—</div>
        <button class="close-panel" onclick="closePanel()">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 3l10 10M13 3L3 13"/></svg>
        </button>
      </div>
      <div class="panel-body" id="panel-body"></div>
    </aside>
  </main>

</div>

<!-- ─── UPLOAD MODAL ──────────────────────────────────────────── -->
<div class="modal-backdrop" id="upload-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Upload Lead List</div>
      <button class="close-panel" onclick="closeUploadModal()">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 3l10 10M13 3L3 13"/></svg>
      </button>
    </div>
    <div class="modal-body" id="upload-modal-body">
      <!-- Step 1: select property + file -->
      <div id="upload-step-1">
        <div>
          <label>Select the property you are uploading for</label>
          <div class="property-picker" id="upload-property-picker"></div>
        </div>
        <div>
          <label>Excel or CSV File</label>
          <div class="drop-zone" id="drop-zone"
            onclick="document.getElementById('file-input').click()"
            ondragover="handleDragOver(event)"
            ondragleave="handleDragLeave(event)"
            ondrop="handleDrop(event)">
            <div class="drop-zone-icon">📂</div>
            <div class="drop-zone-text">Click to browse or drag & drop</div>
            <div class="drop-zone-sub">.xlsx  .xls  .csv</div>
            <div class="drop-zone-file hidden" id="drop-zone-filename"></div>
          </div>
          <input type="file" id="file-input" accept=".xlsx,.xls,.csv" class="hidden" onchange="handleFileSelect(event)" />
        </div>
        <div class="checkbox-row">
          <input type="checkbox" id="read-all-sheets" />
          <span>Read all sheets (not just "target list")</span>
        </div>
        <div id="upload-step1-error" class="message message-error hidden"></div>
      </div>

      <!-- Step 2: preview -->
      <div id="upload-step-2" class="hidden">
        <div class="preview-results" id="preview-results"></div>
        <div id="preview-message" class="message message-info"></div>
      </div>
    </div>
    <div class="modal-footer" id="upload-modal-footer">
      <button class="btn btn-ghost" onclick="closeUploadModal()">Cancel</button>
      <button class="btn btn-primary" id="upload-action-btn" onclick="handleUploadAction()">
        Preview
      </button>
    </div>
  </div>
</div>

<!-- ─── MANAGE PROPERTIES MODAL ───────────────────────────────── -->
<div class="modal-backdrop" id="manage-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Manage Properties</div>
      <button class="close-panel" onclick="closeManageModal()">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 3l10 10M13 3L3 13"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div>
        <label>Add New Property</label>
        <div style="display:flex;gap:8px">
          <input type="text" id="new-property-name" placeholder="e.g. Portland Timbers" onkeydown="if(event.key==='Enter')addProperty()" style="flex:1" />
          <button class="btn btn-primary" onclick="addProperty()">Add</button>
        </div>
        <div id="add-property-error" class="message message-error hidden" style="margin-top:8px"></div>
      </div>
      <div>
        <div class="panel-section-title">Existing Properties</div>
        <div class="property-list" id="property-list">
          <div style="color:var(--text-faint);font-size:12px;padding:8px 0">No properties yet.</div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeManageModal()">Done</button>
    </div>
  </div>
</div>

<script>
'use strict';

/* ─── STATE ──────────────────────────────────────────────────── */
let brands = [];
let properties = [];
let filter = 'all';
let sortCol = 'displayName';
let sortDir = 'asc';
let selectedBrandId = null;

// Upload flow state
let uploadFile = null;
let uploadStep = 1; // 1 = select, 2 = preview
let uploadPreview = null;
let selectedUploadPropertyId = null;
let selectedUploadPropertyName = null;

/* ─── INIT ───────────────────────────────────────────────────── */
async function init() {
  await Promise.all([loadBrands(), loadProperties()]);
}

/* ─── DATA LOADING ───────────────────────────────────────────── */
async function loadBrands() {
  try {
    const res = await fetch('/api/brands');
    brands = await res.json();
    renderTable();
    updateStats();
  } catch (e) {
    console.error('Failed to load brands', e);
  }
}

async function loadProperties() {
  try {
    const res = await fetch('/api/properties');
    properties = await res.json();
    renderPropertyColumns();
    renderPropertyList();
    updateStats();
  } catch (e) {
    console.error('Failed to load properties', e);
  }
}

/* ─── TABLE RENDERING ────────────────────────────────────────── */
function getFilteredBrands() {
  const query = document.getElementById('search-input').value.trim().toLowerCase();
  return brands
    .filter(b => {
      if (filter === 'crossovers' && (b.appearances || []).length < 2) return false;
      if (query && !b.displayName.toLowerCase().includes(query)) return false;
      return true;
    })
    .sort((a, b) => {
      let va, vb;
      if (sortCol === 'displayName') {
        va = a.displayName.toLowerCase();
        vb = b.displayName.toLowerCase();
      } else if (sortCol === 'crossover') {
        va = (a.appearances || []).length;
        vb = (b.appearances || []).length;
      } else {
        // Property column: sort by whether brand appears in that property
        const propId = sortCol;
        va = (a.appearances || []).some(x => x.propertyId === propId) ? 1 : 0;
        vb = (b.appearances || []).some(x => x.propertyId === propId) ? 1 : 0;
      }
      if (va < vb) return sortDir === 'asc' ? -1 : 1;
      if (va > vb) return sortDir === 'asc' ? 1 : -1;
      return 0;
    });
}

function renderPropertyColumns() {
  const thead = document.getElementById('table-head');
  thead.innerHTML = `
    <tr>
      <th onclick="setSort('displayName')" class="${sortCol === 'displayName' ? 'sort-' + sortDir : ''}">Brand</th>
      ${properties.map(p => `
        <th onclick="setSort('${p.id}')" class="${sortCol === p.id ? 'sort-' + sortDir : ''}" style="text-align:center">
          ${escHtml(p.name)}
        </th>
      `).join('')}
      <th onclick="setSort('crossover')" class="${sortCol === 'crossover' ? 'sort-' + sortDir : ''}">Crossover</th>
      <th></th>
    </tr>
  `;
}

function renderTable() {
  const filtered = getFilteredBrands();
  const tbody = document.getElementById('table-body');
  const loadingState = document.getElementById('loading-state');
  const emptyState = document.getElementById('empty-state');
  const tableWrap = document.getElementById('table-wrap');

  loadingState.classList.add('hidden');

  if (brands.length === 0) {
    emptyState.classList.remove('hidden');
    tableWrap.classList.add('hidden');
    document.getElementById('table-count').textContent = '';
    return;
  }

  emptyState.classList.add('hidden');
  tableWrap.classList.remove('hidden');

  renderPropertyColumns();

  tbody.innerHTML = filtered.map((b, i) => {
    const appearances = b.appearances || [];
    const isCrossover = appearances.length >= 2;

    const propCells = properties.map(p => {
      const has = appearances.some(a => a.propertyId === p.id);
      return `<td class="td-prop">
        ${has ? `<span class="check-yes">
          <svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.8">
            <polyline points="1.5,5 4,7.5 8.5,2.5"/>
          </svg>
        </span>` : ''}
      </td>`;
    }).join('');

    return `<tr
      style="animation-delay:${Math.min(i * 15, 200)}ms"
      onclick="openPanel('${b.id}')"
      class="${selectedBrandId === b.id ? 'selected' : ''}">
      <td class="td-brand" title="${escHtml(b.displayName)}">${escHtml(b.displayName)}</td>
      ${propCells}
      <td>
        <span class="crossover-badge ${isCrossover ? 'crossover-yes' : 'crossover-no'}">
          <span class="crossover-dot"></span>
          ${isCrossover ? 'YES' : 'NO'}
        </span>
      </td>
      <td>
        <button class="view-btn" onclick="event.stopPropagation();openPanel('${b.id}')">View →</button>
      </td>
    </tr>`;
  }).join('');

  const count = filtered.length;
  const total = brands.length;
  document.getElementById('table-count').textContent =
    count === total ? `${total} brand${total !== 1 ? 's' : ''}` : `${count} of ${total}`;
}

function updateStats() {
  const crossovers = brands.filter(b => (b.appearances || []).length >= 2).length;
  document.getElementById('stat-brands').textContent = brands.length;
  document.getElementById('stat-properties').textContent = properties.length;
  document.getElementById('stat-crossovers').textContent = crossovers;
}

/* ─── SORTING & FILTERING ────────────────────────────────────── */
function setSort(col) {
  if (sortCol === col) {
    sortDir = sortDir === 'asc' ? 'desc' : 'asc';
  } else {
    sortCol = col;
    sortDir = col === 'crossover' ? 'desc' : 'asc';
  }
  renderTable();
}

function setFilter(value, btn) {
  filter = value;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

/* ─── DETAIL PANEL ───────────────────────────────────────────── */
function openPanel(brandId) {
  selectedBrandId = brandId;
  const brand = brands.find(b => b.id === brandId);
  if (!brand) return;

  renderTable(); // re-render to highlight selected row

  const panel = document.getElementById('detail-panel');
  document.getElementById('panel-brand-name').textContent = brand.displayName;
  renderPanelBody(brand);
  panel.classList.add('open');
}

function closePanel() {
  selectedBrandId = null;
  document.getElementById('detail-panel').classList.remove('open');
  renderTable();
}

function renderPanelBody(brand) {
  const appearances = brand.appearances || [];
  const body = document.getElementById('panel-body');

  let html = '';

  if (appearances.length) {
    html += `<div>
      <div class="panel-section-title">Properties (${appearances.length})</div>`;
    appearances.forEach(a => {
      const date = a.addedAt ? new Date(a.addedAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '';
      html += `<div class="property-appearance">
        <div class="prop-name-row">
          <span class="prop-dot"></span>
          <span class="prop-name">${escHtml(a.propertyName)}</span>
          <span class="prop-date">${date}</span>
        </div>
        <div class="prop-notes ${a.notes ? '' : 'prop-notes-empty'}">
          ${a.notes ? escHtml(a.notes) : 'No notes'}
        </div>
      </div>`;
    });
    html += '</div>';
  }

  body.innerHTML = html;
}

/* ─── UPLOAD MODAL ───────────────────────────────────────────── */
function openUploadModal() {
  uploadFile = null;
  uploadStep = 1;
  uploadPreview = null;
  selectedUploadPropertyId = null;
  selectedUploadPropertyName = null;

  // Reset UI
  document.getElementById('upload-step-1').classList.remove('hidden');
  document.getElementById('upload-step-2').classList.add('hidden');
  document.getElementById('upload-step1-error').classList.add('hidden');
  document.getElementById('drop-zone').classList.remove('has-file');
  document.getElementById('drop-zone-filename').classList.add('hidden');
  document.getElementById('drop-zone-filename').textContent = '';
  document.getElementById('file-input').value = '';
  document.getElementById('read-all-sheets').checked = false;
  document.getElementById('upload-action-btn').textContent = 'Preview';

  // Render property picker buttons
  const picker = document.getElementById('upload-property-picker');
  if (properties.length === 0) {
    picker.innerHTML = '<div class="property-picker-empty">No properties yet — add one first via Manage Properties.</div>';
  } else {
    picker.innerHTML = properties.map(p => `
      <button
        class="property-pick-btn"
        data-id="${escAttr(p.id)}"
        data-name="${escAttr(p.name)}"
        onclick="selectUploadProperty('${escAttr(p.id)}', '${escAttr(p.name)}', this)">
        <span class="pick-dot"></span>
        ${escHtml(p.name)}
      </button>
    `).join('');
  }

  document.getElementById('upload-modal').classList.add('open');
}

function closeUploadModal() {
  document.getElementById('upload-modal').classList.remove('open');
}

function handleDragOver(e) {
  e.preventDefault();
  document.getElementById('drop-zone').classList.add('dragover');
}

function handleDragLeave() {
  document.getElementById('drop-zone').classList.remove('dragover');
}

function handleDrop(e) {
  e.preventDefault();
  document.getElementById('drop-zone').classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file) setUploadFile(file);
}

function handleFileSelect(e) {
  const file = e.target.files[0];
  if (file) setUploadFile(file);
}

function setUploadFile(file) {
  uploadFile = file;
  const dz = document.getElementById('drop-zone');
  const fname = document.getElementById('drop-zone-filename');
  dz.classList.add('has-file');
  fname.classList.remove('hidden');
  fname.textContent = '✓ ' + file.name;
}

async function handleUploadAction() {
  if (uploadStep === 1) {
    await doUploadPreview();
  } else if (uploadStep === 2) {
    await doUploadConfirm();
  }
}

function selectUploadProperty(id, name, btn) {
  selectedUploadPropertyId = id;
  selectedUploadPropertyName = name;
  document.querySelectorAll('.property-pick-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

async function doUploadPreview() {
  const errEl = document.getElementById('upload-step1-error');
  errEl.classList.add('hidden');

  if (!selectedUploadPropertyId) {
    errEl.textContent = 'Please select a property above before uploading.';
    errEl.classList.remove('hidden');
    return;
  }

  if (!uploadFile) {
    errEl.textContent = 'Please select a file.';
    errEl.classList.remove('hidden');
    return;
  }

  const propertyId = selectedUploadPropertyId;
  const propertyName = selectedUploadPropertyName;

  const btn = document.getElementById('upload-action-btn');
  btn.disabled = true;
  btn.textContent = 'Parsing…';

  try {
    const base64 = await fileToBase64(uploadFile);
    const readAllSheets = document.getElementById('read-all-sheets').checked;

    const res = await fetch('/api/upload', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        fileBase64: base64,
        filename: uploadFile.name,
        propertyId,
        propertyName,
        readAllSheets,
      }),
    });

    const data = await res.json();
    if (!res.ok) {
      errEl.textContent = data.error || 'Upload failed.';
      errEl.classList.remove('hidden');
      btn.disabled = false;
      btn.textContent = 'Preview';
      return;
    }

    uploadPreview = data.preview;
    showUploadPreview(uploadPreview);
    btn.disabled = false;
    btn.textContent = 'Confirm Upload';
    uploadStep = 2;
  } catch (e) {
    errEl.textContent = 'Error: ' + e.message;
    errEl.classList.remove('hidden');
    btn.disabled = false;
    btn.textContent = 'Preview';
  }
}

function showUploadPreview(preview) {
  document.getElementById('upload-step-1').classList.add('hidden');
  document.getElementById('upload-step-2').classList.remove('hidden');

  const newCount = (preview.newBrands || []).length;
  const matchCount = (preview.matchedBrands || []).length;
  const total = preview.total || 0;

  document.getElementById('preview-results').innerHTML = `
    <div class="preview-stat">
      <span class="preview-stat-val green">${newCount}</span>
      <span class="preview-stat-label">New brands</span>
    </div>
    <div class="preview-stat">
      <span class="preview-stat-val amber">${matchCount}</span>
      <span class="preview-stat-label">Crossover links</span>
    </div>
    <div class="preview-stat">
      <span class="preview-stat-val">${total}</span>
      <span class="preview-stat-label">Total parsed</span>
    </div>
  `;

  const crossoverNames = (preview.matchedBrands || [])
    .slice(0, 3)
    .map(b => b.existingDisplayName || b.displayName)
    .join(', ');

  let msg = `Parsed ${total} companies from <strong>${escHtml(preview.propertyName)}</strong>.`;
  if (matchCount > 0) {
    msg += ` <strong>${matchCount}</strong> will be flagged as crossover${matchCount !== 1 ? 's' : ''}${crossoverNames ? ' (' + escHtml(crossoverNames) + (matchCount > 3 ? '…' : '') + ')' : ''}.`;
  }

  document.getElementById('preview-message').innerHTML = msg;
}

async function doUploadConfirm() {
  const btn = document.getElementById('upload-action-btn');
  btn.disabled = true;
  btn.textContent = 'Saving…';

  try {
    const res = await fetch('/api/upload/confirm', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ preview: uploadPreview }),
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Confirm failed');

    closeUploadModal();
    await loadBrands();
  } catch (e) {
    alert('Save failed: ' + e.message);
    btn.disabled = false;
    btn.textContent = 'Confirm Upload';
  }
}

/* ─── MANAGE PROPERTIES MODAL ────────────────────────────────── */
function openManageModal() {
  document.getElementById('new-property-name').value = '';
  document.getElementById('add-property-error').classList.add('hidden');
  renderPropertyList();
  document.getElementById('manage-modal').classList.add('open');
}

function closeManageModal() {
  document.getElementById('manage-modal').classList.remove('open');
}

function renderPropertyList() {
  const list = document.getElementById('property-list');
  if (!properties.length) {
    list.innerHTML = '<div style="color:var(--text-faint);font-size:12px;padding:8px 0">No properties yet.</div>';
    return;
  }
  list.innerHTML = properties.map(p => `
    <div class="property-item">
      <span class="prop-item-dot"></span>
      <span class="prop-item-name">${escHtml(p.name)}</span>
      <button class="btn btn-danger btn-sm" onclick="deleteProperty('${p.id}', '${escAttr(p.name)}')">Remove</button>
    </div>
  `).join('');
}

async function addProperty() {
  const input = document.getElementById('new-property-name');
  const errEl = document.getElementById('add-property-error');
  const name = input.value.trim();
  errEl.classList.add('hidden');

  if (!name) {
    errEl.textContent = 'Please enter a property name.';
    errEl.classList.remove('hidden');
    return;
  }

  try {
    const res = await fetch('/api/properties', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed');

    input.value = '';
    await loadProperties();
    renderPropertyList();
    updateStats();
  } catch (e) {
    errEl.textContent = 'Error: ' + e.message;
    errEl.classList.remove('hidden');
  }
}

async function deleteProperty(id, name) {
  if (!confirm(`Remove "${name}" and all its brand appearances? This cannot be undone.`)) return;

  try {
    const res = await fetch(`/api/properties/${id}`, { method: 'DELETE' });
    if (!res.ok) {
      const data = await res.json();
      throw new Error(data.error || 'Failed');
    }
    await Promise.all([loadProperties(), loadBrands()]);
    renderPropertyList();
    if (selectedBrandId) {
      const brand = brands.find(b => b.id === selectedBrandId);
      if (brand) renderPanelBody(brand);
    }
  } catch (e) {
    alert('Delete failed: ' + e.message);
  }
}

/* ─── HELPERS ────────────────────────────────────────────────── */
function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function escAttr(str) {
  return String(str).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

/* ─── KEYBOARD ───────────────────────────────────────────────── */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeUploadModal();
    closeManageModal();
    closePanel();
  }
});

/* ─── BOOT ───────────────────────────────────────────────────── */
init();
</script>
</body>
</html>
